version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: scl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: scl
      POSTGRES_PASSWORD: scl_secret_2024
      POSTGRES_DB: scl_sms
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U scl -d scl_sms']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scl-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
