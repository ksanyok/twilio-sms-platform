version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scl-app
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://scl:${POSTGRES_PASSWORD:-scl_secret_2024}@postgres:5432/scl_sms
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: scl-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: scl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: scl
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scl_secret_2024}
      POSTGRES_DB: scl_sms
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U scl -d scl_sms']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scl-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
