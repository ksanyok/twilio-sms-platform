name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json
      - name: Install server dependencies
        run: cd server && npm ci
      - name: Install client dependencies
        run: cd client && npm ci
      - name: Generate Prisma client
        run: cd server && npx prisma generate
      - name: TypeScript check (server)
        run: cd server && npx tsc --noEmit
      - name: TypeScript check (client)
        run: cd client && npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_root_pw
          MYSQL_DATABASE: sms_test
          MYSQL_USER: sms_test
          MYSQL_PASSWORD: sms_test_pw
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u root -ptest_root_pw"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: cd server && npm ci
      - name: Generate Prisma client
        run: cd server && npx prisma generate
      - name: Push database schema
        env:
          DATABASE_URL: mysql://sms_test:sms_test_pw@localhost:3306/sms_test
        run: cd server && npx prisma db push --skip-generate
      - name: Run tests
        env:
          DATABASE_URL: mysql://sms_test:sms_test_pw@localhost:3306/sms_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-ci-only
          JWT_REFRESH_SECRET: test-refresh-secret-ci-only
          NODE_ENV: test
        run: cd server && npx vitest --run

  build:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t scl-sms-platform:${{ github.sha }} .
