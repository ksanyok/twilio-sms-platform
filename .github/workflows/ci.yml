name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json
      - name: Install server dependencies
        run: cd server && npm ci
      - name: Install client dependencies
        run: cd client && npm ci
      - name: Generate Prisma client
        run: cd server && npx prisma generate
      - name: TypeScript check (server)
        run: cd server && npx tsc --noEmit
      - name: TypeScript check (client)
        run: cd client && npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scl
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD || 'scl_secret_2024' }}
          POSTGRES_DB: scl_sms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scl"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: cd server && npm ci
      - name: Generate Prisma client
        run: cd server && npx prisma generate
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://scl:scl_secret_2024@localhost:5432/scl_sms_test
        run: cd server && npx prisma migrate deploy
      - name: Run tests
        env:
          DATABASE_URL: postgresql://scl:scl_secret_2024@localhost:5432/scl_sms_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
          NODE_ENV: test
        run: cd server && npm test

  build:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t scl-sms-platform:${{ github.sha }} .
